services:
  mysql:
    image: mysql:8.4
    container_name: bookswap-mysql-dev
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: bookswap
      MYSQL_DATABASE: bookswap_dev
      MYSQL_USER: bookswap
      MYSQL_PASSWORD: bookswap
    volumes:
      - bookswap_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ubookswap", "-pbookswap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bookswap_mysql_data:
